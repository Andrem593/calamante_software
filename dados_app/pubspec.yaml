name: dados_app
description: App de toma de pedidos para DADOS.
publish_to: "none"
version: 1.0.3+4

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.1
  geolocator: ^11.0.0
  google_maps_flutter: ^2.6.0
  local_auth: ^2.1.8
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  signature: ^6.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
